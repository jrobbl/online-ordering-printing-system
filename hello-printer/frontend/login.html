<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Printer — Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 8px;
        }

        h1 {
            color: #e0e0e0;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #666;
            font-size: 13px;
            text-align: center;
            margin-bottom: 36px;
        }

        label {
            display: block;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #0f3460;
            border: 1px solid #1a4a8a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #e94560;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: #c73652;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .error {
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid rgba(233, 69, 96, 0.4);
            color: #e94560;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🖨️</div>
        <h1>Hello Printer</h1>
        <p class="subtitle">Admin access only</p>

        <div class="error" id="error"></div>

        <label for="username">Username</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username" />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />

        <button id="loginBtn" onclick="login()">Log in</button>
    </div>

    <script>
        // If already logged in redirect straight to admin
        if (localStorage.getItem('hp_token')) {
            window.location.href = '/admin.html';
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('error');

            error.style.display = 'none';

            if (!username || !password) {
                error.textContent = 'Please enter username and password';
                error.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok && data.token) {
                    localStorage.setItem('hp_token', data.token);
                    window.location.href = '/admin.html';
                } else {
                    error.textContent = data.message || 'Invalid credentials';
                    error.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Log in';
                }

            } catch (err) {
                error.textContent = 'Could not connect to server';
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Log in';
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
