version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: oos_postgres
    environment:
      POSTGRES_USER: oos_admin
      POSTGRES_PASSWORD: oos_secret_2024
      POSTGRES_DB: oos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

volumes:
  postgres_data:
