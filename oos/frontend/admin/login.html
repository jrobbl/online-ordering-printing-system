<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Panadería</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Additional styles specific to login page */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }

        .login-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: var(--spacing-2xl);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .login-header h1 {
            color: var(--primary-color);
            margin-bottom: var(--spacing-xs);
        }

        .login-header p {
            color: var(--gray);
            margin: 0;
        }

        .error-message {
            background-color: #ffebee;
            border: 1px solid var(--error);
            color: var(--error);
            padding: var(--spacing-sm);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-md);
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .login-footer {
            text-align: center;
            margin-top: var(--spacing-lg);
            color: var(--gray);
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <h1>🔐 Inicio de Sesión</h1>
                <p>EMMER Panadería</p>
            </div>

            <!-- Error Message -->
            <div id="error-message" class="error-message">
                Credenciales inválidas
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">Usuario</label>
                    <input type="text" id="username" class="form-control" placeholder="Ingresa tu usuario" required
                        autocomplete="username">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="Ingresa tu contraseña"
                        required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                    Iniciar Sesión
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>&copy; 2026 EMMER Panadería</p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
