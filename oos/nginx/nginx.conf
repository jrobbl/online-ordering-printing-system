# Main nginx configuration for bakery system

# Upstream backend API
upstream backend_api {
    server backend:3000;
}

server {
    listen 80;
    server_name bakery.jrobbl.com localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # API endpoints - proxy to backend (MUST be before location / to avoid rewrite)
    location /api/ {
        proxy_pass http://backend_api/api/;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Admin frontend - redirect /admin to /admin/
    location = /admin {
        return 301 $scheme://$http_host/admin/;
    }

    # Admin frontend - serve files
    location /admin/ {
        rewrite ^/admin/$ /admin/index.html break;
        rewrite ^/admin/(.+)$ /admin/$1 break;

        # Cache static assets
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Customer frontend (main page) - catch-all, must be last
    location / {
        rewrite ^/$ /customer/index.html break;
        rewrite ^/(.+)$ /customer/$1 break;

        # Cache static assets
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            rewrite ^/(.+)$ /customer/$1 break;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
